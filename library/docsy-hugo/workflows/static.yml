# Build-only validation for the site on `main`.
#
# Publishing is handled exclusively by .github/workflows/build-content.yml,
# which deploys using main's site chrome + the `content` branch's articles.
# This workflow only verifies that the site still builds when main changes
# (layouts, config, Hugo modules); it never deploys to GitHub Pages.
#
# Uses only first-party GitHub-owned actions (actions/*). Hugo, Dart Sass,
# and any other tooling are installed directly from their official release
# tarballs so we avoid any third-party / marketplace actions.
name: Build site (validation only)

on:
  # Validate the site builds on pushes to and PRs against the default branch.
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# Read-only: this workflow validates the build and never deploys.
permissions:
  contents: read

# Cancel superseded validation runs on the same ref.
concurrency:
  group: "build-validation-${{ github.ref }}"
  cancel-in-progress: true

# Default to bash
defaults:
  run:
    shell: bash

jobs:
  # Build job (validation only — no deploy)
  build:
    runs-on: ubuntu-latest
    env:
      # Keep HUGO_VERSION in sync with hugo-extended pinned in package.json.
      DART_SASS_VERSION: 1.99.0
      GO_VERSION: 1.26.2
      HUGO_VERSION: 0.162.1
      NODE_VERSION: 22
      TZ: America/Los_Angeles
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
          # Fetch full history so Hugo's .GitInfo / .Lastmod work
          # (hugo.yaml sets enableGitInfo: true).
          fetch-depth: 0

      - name: Setup Go (for Hugo Modules / Docsy)
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Create directory for user-specific executable files
        run: mkdir -p "${HOME}/.local"

      - name: Install Dart Sass
        run: |
          curl -sLJO "https://github.com/sass/dart-sass/releases/download/${DART_SASS_VERSION}/dart-sass-${DART_SASS_VERSION}-linux-x64.tar.gz"
          tar -C "${HOME}/.local" -xf "dart-sass-${DART_SASS_VERSION}-linux-x64.tar.gz"
          rm "dart-sass-${DART_SASS_VERSION}-linux-x64.tar.gz"
          echo "${HOME}/.local/dart-sass" >> "${GITHUB_PATH}"

      - name: Install Hugo (extended)
        run: |
          curl -sLJO "https://github.com/gohugoio/hugo/releases/download/v${HUGO_VERSION}/hugo_extended_${HUGO_VERSION}_linux-amd64.tar.gz"
          mkdir "${HOME}/.local/hugo"
          tar -C "${HOME}/.local/hugo" -xf "hugo_extended_${HUGO_VERSION}_linux-amd64.tar.gz"
          rm "hugo_extended_${HUGO_VERSION}_linux-amd64.tar.gz"
          echo "${HOME}/.local/hugo" >> "${GITHUB_PATH}"

      - name: Verify installations
        run: |
          echo "Dart Sass: $(sass --version)"
          echo "Go: $(go version)"
          echo "Hugo: $(hugo version)"
          echo "Node.js: $(node --version)"

      - name: Install Node.js dependencies
        run: |
          if [[ -f package-lock.json || -f npm-shrinkwrap.json ]]; then
            npm ci
          else
            npm install --no-audit --no-fund
          fi

      - name: Fetch Hugo modules (Docsy)
        # Use the Docsy version pinned in go.mod instead of npm's `ci:prepare`,
        # which calls `hugo mod get github.com/google/docsy@v$npm_package_version`
        # and fails because package.json carries a non-tagged dev version
        # (e.g. 0.15.1-dev+001-over-main-...).
        run: |
          hugo mod graph
          hugo mod tidy

      - name: Configure Git
        run: git config core.quotepath false

      - name: Cache restore
        id: cache-restore
        uses: actions/cache/restore@v4
        with:
          path: ${{ runner.temp }}/hugo_cache
          key: hugo-${{ github.run_id }}
          restore-keys: hugo-

      - name: Build the site
        run: |
          hugo build \
            --gc \
            --minify \
            --cleanDestinationDir \
            --cacheDir "${{ runner.temp }}/hugo_cache"

      - name: Cache save
        id: cache-save
        uses: actions/cache/save@v4
        with:
          path: ${{ runner.temp }}/hugo_cache
          key: ${{ steps.cache-restore.outputs.cache-primary-key }}
